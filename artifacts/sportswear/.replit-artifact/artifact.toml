kind = "web"
previewPath = "/"
title = "Sportswear Store"
version = "1.0.0"
id = "artifacts/sportswear"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25296

[services.development]
run = "pnpm --filter @workspace/sportswear run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sportswear", "run", "build" ]
publicDir = "artifacts/sportswear/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25296"
BASE_PATH = "/"
