openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Sportswear E-commerce API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: orders
    description: Order operations
  - name: banners
    description: Banner operations
  - name: reviews
    description: Review operations
  - name: admin
    description: Admin operations
  - name: store
    description: Store stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Products
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filtering
      parameters:
        - name: category
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: featured
          in: query
          schema:
            type: ["boolean", "null"]
        - name: bestSeller
          in: query
          schema:
            type: ["boolean", "null"]
        - name: newArrival
          in: query
          schema:
            type: ["boolean", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      summary: Get featured products
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"

  /products/best-sellers:
    get:
      operationId: listBestSellers
      tags: [products]
      summary: Get best selling products
      responses:
        "200":
          description: Best sellers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"

  /products/new-arrivals:
    get:
      operationId: listNewArrivals
      tags: [products]
      summary: Get new arrival products
      responses:
        "200":
          description: New arrivals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/reviews:
    get:
      operationId: listProductReviews
      tags: [reviews]
      summary: Get reviews for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewList"
    post:
      operationId: createProductReview
      tags: [reviews]
      summary: Add a review for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # Categories
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryList"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Orders
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderList"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order (COD)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/track/{orderNumber}:
    get:
      operationId: trackOrder
      tags: [orders]
      summary: Track an order by order number
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order tracking info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Banners
  /banners:
    get:
      operationId: listBanners
      tags: [banners]
      summary: List all active banners
      responses:
        "200":
          description: Banners
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BannerList"
    post:
      operationId: createBanner
      tags: [banners]
      summary: Create a banner (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBannerBody"
      responses:
        "201":
          description: Created banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"

  /banners/{id}:
    patch:
      operationId: updateBanner
      tags: [banners]
      summary: Update a banner (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBannerBody"
      responses:
        "200":
          description: Updated banner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Banner"
    delete:
      operationId: deleteBanner
      tags: [banners]
      summary: Delete a banner (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Admin
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin info
      responses:
        "200":
          description: Admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/analytics:
    get:
      operationId: getAdminAnalytics
      tags: [admin]
      summary: Get admin analytics (revenue, orders, customers)
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analytics"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # Store stats
  /store/stats:
    get:
      operationId: getStoreStats
      tags: [store]
      summary: Get public store stats for social proof
      responses:
        "200":
          description: Store stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        comparePrice:
          type: ["number", "null"]
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        sizes:
          type: array
          items:
            type: string
        colors:
          type: array
          items:
            type: string
        stock:
          type: integer
        sku:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isBestSeller:
          type: boolean
        isNewArrival:
          type: boolean
        averageRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - description
        - price
        - comparePrice
        - imageUrl
        - images
        - categoryId
        - categoryName
        - sizes
        - colors
        - stock
        - sku
        - isFeatured
        - isBestSeller
        - isNewArrival
        - averageRating
        - reviewCount
        - createdAt
        - updatedAt

    ProductList:
      type: array
      items:
        $ref: "#/components/schemas/Product"

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        comparePrice:
          type: ["number", "null"]
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        categoryId:
          type: ["integer", "null"]
        sizes:
          type: array
          items:
            type: string
        colors:
          type: array
          items:
            type: string
        stock:
          type: integer
        sku:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isBestSeller:
          type: boolean
        isNewArrival:
          type: boolean
      required:
        - name
        - description
        - price
        - imageUrl
        - stock

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        comparePrice:
          type: ["number", "null"]
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        categoryId:
          type: ["integer", "null"]
        sizes:
          type: array
          items:
            type: string
        colors:
          type: array
          items:
            type: string
        stock:
          type: integer
        sku:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isBestSeller:
          type: boolean
        isNewArrival:
          type: boolean

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        imageUrl:
          type: ["string", "null"]
        productCount:
          type: integer
      required:
        - id
        - name
        - slug
        - imageUrl
        - productCount

    CategoryList:
      type: array
      items:
        $ref: "#/components/schemas/Category"

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        imageUrl:
          type: ["string", "null"]
      required:
        - name
        - slug

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productImage:
          type: string
        price:
          type: number
        quantity:
          type: integer
        size:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
      required:
        - id
        - productId
        - productName
        - productImage
        - price
        - quantity
        - size
        - color

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
          enum: [pending, confirmed, processing, on_the_way, delivered, cancelled]
        fullName:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        notes:
          type: ["string", "null"]
        subtotal:
          type: number
        shippingFee:
          type: number
        total:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - orderNumber
        - status
        - fullName
        - phone
        - address
        - city
        - notes
        - subtotal
        - shippingFee
        - total
        - items
        - createdAt
        - updatedAt

    OrderList:
      type: array
      items:
        $ref: "#/components/schemas/Order"

    CreateOrderItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        size:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
      required:
        - productId
        - quantity

    CreateOrderBody:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        notes:
          type: ["string", "null"]
        shippingFee:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateOrderItemInput"
      required:
        - fullName
        - phone
        - address
        - city
        - shippingFee
        - items

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, processing, on_the_way, delivered, cancelled]
      required:
        - status

    Banner:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        imageUrl:
          type: string
        linkUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        sortOrder:
          type: integer
      required:
        - id
        - title
        - subtitle
        - imageUrl
        - linkUrl
        - isActive
        - sortOrder

    BannerList:
      type: array
      items:
        $ref: "#/components/schemas/Banner"

    CreateBannerBody:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        imageUrl:
          type: string
        linkUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        sortOrder:
          type: integer
      required:
        - title
        - imageUrl

    Review:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        customerName:
          type: string
        rating:
          type: integer
        comment:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - productId
        - customerName
        - rating
        - comment
        - createdAt

    ReviewList:
      type: array
      items:
        $ref: "#/components/schemas/Review"

    CreateReviewBody:
      type: object
      properties:
        customerName:
          type: string
        rating:
          type: integer
        comment:
          type: ["string", "null"]
      required:
        - customerName
        - rating

    AdminLoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
        admin:
          $ref: "#/components/schemas/AdminUser"
      required:
        - token
        - admin

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
      required:
        - id
        - email
        - name

    Analytics:
      type: object
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        totalCustomers:
          type: integer
        totalProducts:
          type: integer
        pendingOrders:
          type: integer
        deliveredOrders:
          type: integer
        revenueByMonth:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyRevenue"
        ordersByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/TopProduct"
      required:
        - totalRevenue
        - totalOrders
        - totalCustomers
        - totalProducts
        - pendingOrders
        - deliveredOrders
        - revenueByMonth
        - ordersByStatus
        - topProducts

    MonthlyRevenue:
      type: object
      properties:
        month:
          type: string
        revenue:
          type: number
        orders:
          type: integer
      required:
        - month
        - revenue
        - orders

    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required:
        - status
        - count

    TopProduct:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalSold:
          type: integer
        revenue:
          type: number
      required:
        - productId
        - productName
        - totalSold
        - revenue

    StoreStats:
      type: object
      properties:
        totalProducts:
          type: integer
        totalOrders:
          type: integer
        happyCustomers:
          type: integer
        averageRating:
          type: number
      required:
        - totalProducts
        - totalOrders
        - happyCustomers
        - averageRating
